    <link rel="stylesheet" href="/CSS/style-app.css">

    <style>
        /* === ENGINE DE GAMIFICAÇÃO - TEMA ROXO (NEURO/FOCO) === */
        .game-wrapper { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; z-index: 10; margin: 0 auto; }
        
        .game-card { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); border: 2px solid #9c27b0; border-radius: 24px; padding: 30px 20px; text-align: center; box-shadow: 0 10px 40px rgba(156, 39, 176, 0.2); min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        #display-sentence { font-size: 1.6rem; font-weight: 700; line-height: 1.4; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8); z-index: 2; }
        .gap { color: #9c27b0; font-weight: 900; }
        
        .game-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .btn-option { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 20px; font-size: 1.2rem; font-weight: 900; border-radius: 16px; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px;}
        .btn-option:hover { border-color: #9c27b0; background: rgba(156, 39, 176, 0.1); transform: translateY(-3px); }
        .btn-option.correct { background: #00e676 !important; color: #000 !important; border-color: #00e676 !important; }
        .btn-option.wrong { background: #ff1744 !important; opacity: 0.5; }

        #feedback { height: 30px; text-align: center; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; transition: all 0.2s; opacity: 0; margin-bottom: 10px; }
        #feedback.visible { opacity: 1; transform: translateY(-5px); }
        
        .xp-pill { background: rgba(0, 0, 0, 0.5); border: 1px solid #9c27b0; padding: 5px 15px; border-radius: 50px; color: #9c27b0; font-weight: 900; font-size: 1.1rem; margin-top: 10px; display: inline-block; }
        .feedback-float { position: absolute; top: -15px; right: -10px; font-weight: 900; font-size: 0.9rem; color: #fff; background: #9c27b0; padding: 5px 12px; border-radius: 20px; border: 1px solid #fff; opacity: 0; transform: translateY(10px); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5; box-shadow: 0 0 10px #9c27b0;}
        .feedback-float.show { opacity: 1; transform: translateY(0) rotate(5deg); }
        .speed-badge { position: absolute; bottom: 10px; width: 100%; left: 0; text-align: center; font-size: 0.75rem; color: #00e676; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }

        .progress-track { width: 100%; height: 5px; background: rgba(255,255,255,0.1); position: fixed; top: 0; left: 0; z-index: 1000; }
        .progress-fill { height: 100%; background: #9c27b0; width: 0%; transition: width 0.3s ease; box-shadow: 0 0 10px #9c27b0; }

        .casino-coin { position: fixed; width: 25px; height: 25px; background: #9c27b0; border-radius: 50%; box-shadow: 0 0 15px rgba(156, 39, 176, 1); pointer-events: none; z-index: 9999; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #fff; }
        @keyframes coin-explosion { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(360deg); opacity: 0; } }
        
        .rain-coin { position: fixed; width: 35px; height: 35px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%239c27b0" stroke="%23fff" stroke-width="5"/><text x="50" y="65" font-size="40" text-anchor="middle" font-weight="bold" fill="%23fff" font-family="Arial">XP</text></svg>') no-repeat center; background-size: contain; pointer-events: none; z-index: 9999; top: -50px; animation: coin-drop linear forwards; }
        @keyframes coin-drop { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0.8; } }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        .shake-effect { animation: shake 0.4s ease-in-out; border-color: #ff1744 !important; box-shadow: 0 0 20px rgba(255, 23, 68, 0.5) !important;}

        .btn-voltar { display: block; margin: 30px auto; padding: 15px 30px; background: transparent; border: 2px solid #9c27b0; color: #9c27b0; border-radius: 50px; text-decoration: none; font-weight: 900; text-align: center; max-width: 300px; text-transform: uppercase; transition: all 0.3s; }
        .btn-voltar:hover { background: #9c27b0; color: #fff; box-shadow: 0 0 15px #9c27b0;}
    </style>

<body>

    <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>

    <header class="glass-header" style="text-align: center; padding: 20px;">
        <h1 style="color: #fff; margin-bottom: 5px;">FAST <span style="color: #9c27b0;">RECALL</span></h1>
        <p class="subtitle" style="color: #ccc;">Sobreviva aos Falsos Cognatos</p>
        <div class="xp-pill">XP: <span id="xp-val">0</span></div>
        <div style="font-size: 0.85rem; font-weight: bold; color: #9c27b0; margin-top: 5px;">Retenção Neural: <span id="q-count">0</span> / 100</div>
    </header>

    <main style="max-width: 800px; margin: 20px auto; padding: 0 20px;">
        <div id="game-container" class="game-wrapper">
            <div id="feedback"></div>
            
            <div class="game-card" id="game-card-element">
                <div id="combo-feedback" class="feedback-float">COMBO x2</div>
                <div id="speed-feedback" class="speed-badge"></div>
                <div id="display-sentence">Iniciando Varredura Cerebral...</div>
            </div>

            <div class="game-controls" id="ab-controls">
                <button id="btn1" class="btn-option" onclick="checkAnswer(1)">A</button>
                <button id="btn2" class="btn-option" onclick="checkAnswer(2)">B</button>
            </div>
        </div>

        <a href="indexpasta011.html" class="btn-voltar">⬅ Sair do Simulador</a>
    </main>

    <script>
        // === 1. BANCO DE DADOS: FALSOS COGNATOS E PALAVRAS CONFUSAS ===
        const memoryTraps = [
            { en: "Actually", pt: "Na verdade", trap: "Atualmente" },
            { en: "Pretend", pt: "Fingir", trap: "Pretender" },
            { en: "Intend", pt: "Pretender", trap: "Entender" },
            { en: "Parents", pt: "Pais (Pai e Mãe)", trap: "Parentes" },
            { en: "Relatives", pt: "Parentes", trap: "Relativos" },
            { en: "Realize", pt: "Perceber / Dar-se conta", trap: "Realizar (fazer)" },
            { en: "Notice", pt: "Notar", trap: "Notícia" },
            { en: "Library", pt: "Biblioteca", trap: "Livraria" },
            { en: "Bookstore", pt: "Livraria", trap: "Biblioteca" },
            { en: "Mayor", pt: "Prefeito", trap: "Maior" },
            { en: "Fabric", pt: "Tecido", trap: "Fábrica" },
            { en: "Factory", pt: "Fábrica", trap: "Tecido" },
            { en: "Lunch", pt: "Almoço", trap: "Lanche" },
            { en: "Snack", pt: "Lanche", trap: "Cobra" },
            { en: "College", pt: "Faculdade", trap: "Colégio (Ensino Médio)" },
            { en: "Comprehensive", pt: "Abrangente / Completo", trap: "Compreensivo" },
            { en: "Sensible", pt: "Sensato / Racional", trap: "Sensível" },
            { en: "Sensitive", pt: "Sensível", trap: "Sensato" },
            { en: "Data", pt: "Dados / Informação", trap: "Data (dia/mês)" },
            { en: "Date", pt: "Data (dia) / Encontro", trap: "Dados" },
            { en: "Attend", pt: "Frequentar / Comparecer", trap: "Atender (telefone)" },
            { en: "Assist", pt: "Ajudar", trap: "Assistir (TV)" },
            { en: "Cigar", pt: "Charuto", trap: "Cigarro" },
            { en: "Costume", pt: "Fantasia (roupa)", trap: "Costume / Hábito" },
            { en: "Custom", pt: "Costume / Tradição", trap: "Fantasia" },
            { en: "Deception", pt: "Engano / Fraude", trap: "Decepção" },
            { en: "Disappointment", pt: "Decepção", trap: "Apontamento" },
            { en: "Estate", pt: "Bens / Propriedade", trap: "Estado" },
            { en: "Exit", pt: "Saída", trap: "Êxito / Sucesso" },
            { en: "Success", pt: "Sucesso", trap: "Sucessão" },
            { en: "Hazard", pt: "Risco / Perigo", trap: "Azar" },
            { en: "Ingenuity", pt: "Engenhosidade / Criatividade", trap: "Ingenuidade" },
            { en: "Injury", pt: "Ferimento / Lesão", trap: "Injúria (ofensa)" },
            { en: "Lecture", pt: "Palestra / Aula", trap: "Leitura" },
            { en: "Novel", pt: "Romance (livro)", trap: "Novela (TV)" },
            { en: "Physician", pt: "Médico", trap: "Físico" },
            { en: "Policy", pt: "Política (diretrizes/regras)", trap: "Polícia" },
            { en: "Prejudice", pt: "Preconceito", trap: "Prejuízo" },
            { en: "Prescribe", pt: "Receitar / Prescrever", trap: "Escrever" },
            { en: "Push", pt: "Empurrar", trap: "Puxar" },
            { en: "Pull", pt: "Puxar", trap: "Pular" },
            { en: "Record", pt: "Gravar / Registro", trap: "Recordar" },
            { en: "Resume", pt: "Retomar / Recomeçar", trap: "Resumir" },
            { en: "Summarize", pt: "Resumir", trap: "Somar" },
            { en: "Support", pt: "Apoiar / Dar suporte", trap: "Suportar (tolerar)" },
            { en: "Stand", pt: "Suportar (tolerar)", trap: "Ficar em pé" },
            { en: "Tax", pt: "Imposto", trap: "Táxi" },
            { en: "Terrific", pt: "Excelente / Formidável", trap: "Terrível" },
            { en: "Terrible", pt: "Terrível", trap: "Formidável" },
            { en: "Valuable", pt: "Valioso", trap: "Válido" }
        ];

        let database = [];
        
        // Multiplicador de Foco: Gera as 100 perguntas baseadas nos falsos cognatos
        memoryTraps.forEach(item => {
            // VARIAÇÃO 1: O Que significa (Inglês -> PT)
            database.push({ q: `Qual a tradução real de:<br><span class='gap'>${item.en.toUpperCase()}</span> ?`, correct: item.pt, wrong: item.trap });
            
            // VARIAÇÃO 2: Como se diz (PT -> Inglês)
            // Para a resposta errada, pegamos um 'trap' de outro item para confundir
            let randomWrongEn = memoryTraps[Math.floor(Math.random() * memoryTraps.length)].en;
            while(randomWrongEn === item.en) {
                randomWrongEn = memoryTraps[Math.floor(Math.random() * memoryTraps.length)].en;
            }
            database.push({ q: `Como se diz:<br><span class='gap'>${item.pt.toUpperCase()}</span> ?`, correct: item.en, wrong: randomWrongEn });
            
            // VARIAÇÃO 3: Pegadinha de Contexto
            database.push({ q: `Cuidado! A palavra <span class='gap'>${item.en}</span> NÃO significa:`, correct: item.trap, wrong: item.pt });
        });

        // Embaralhar tudo e cortar em 100 testes exatos
        database = database.sort(() => Math.random() - 0.5).slice(0, 100);

        // === 2. MOTOR DE ÁUDIO E EFEITOS DOPAMINA ===
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAudio(type) {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            const t = audioCtx.currentTime;
            if(type === 'win') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, t);
                gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                osc.start(t); osc.stop(t + 0.15);
            } else if(type === 'error') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, t); osc.frequency.linearRampToValueAtTime(80, t + 0.25);
                gain.gain.setValueAtTime(0.08, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                osc.start(t); osc.stop(t + 0.3);
            } else if(type === 'combo') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'square'; const baseFreq = Math.min(400 + (state.combo * 50), 1200);
                osc.frequency.setValueAtTime(baseFreq, t); osc.frequency.linearRampToValueAtTime(baseFreq + 200, t + 0.15); 
                gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
            } else if(type === 'milestone') {
                [523.25, 659.25, 783.99, 1046.50, 1318.5].forEach((f, i) => {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(f, t + (i * 0.08)); 
                    gain.gain.setValueAtTime(0.1, t + (i * 0.08)); gain.gain.exponentialRampToValueAtTime(0.01, t + (i * 0.08) + 1.0);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(t + (i * 0.08)); osc.stop(t + (i * 0.08) + 1.0);
                });
            }
        }

        function triggerCasinoEffect(amount = 20) {
            for (let i = 0; i < amount; i++) {
                const coin = document.createElement('div');
                coin.classList.add('casino-coin');
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 150; 
                coin.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                coin.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                coin.style.animation = `coin-explosion ${0.5 + Math.random() * 0.5}s ease-out forwards`;
                document.body.appendChild(coin);
                setTimeout(() => coin.remove(), 1000);
            }
        }

        function triggerCoinRain(amount = 80) {
            for (let i = 0; i < amount; i++) {
                const coin = document.createElement('div');
                coin.classList.add('rain-coin');
                coin.style.left = Math.random() * 100 + 'vw';
                coin.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
                coin.style.animationDelay = (Math.random() * 1.0) + 's';
                document.body.appendChild(coin);
                setTimeout(() => coin.remove(), 3500);
            }
        }

        // === 3. CONTROLE DE ESTADO E EXECUÇÃO ===
        let xp = parseInt(localStorage.getItem('ffes_xp') || 0);
        document.getElementById('xp-val').innerText = xp;
        let state = { currentQ: null, combo: 0, startTime: 0, questionIndex: 0 };

        function startGame() { generate(); }

        function generate() {
            if(state.questionIndex >= 100) {
                document.getElementById('display-sentence').innerHTML = "MEMÓRIA BLINDADA!<br><span style='color:#00e676'>100/100</span>";
                document.getElementById('ab-controls').style.display = 'none';
                playAudio('milestone'); triggerCoinRain(100);
                return;
            }

            document.querySelectorAll('.btn-option').forEach(b => b.className = 'btn-option');
            document.getElementById('feedback').className = ''; 
            document.getElementById('speed-feedback').innerText = "";
            document.getElementById('q-count').innerText = state.questionIndex + 1;

            const item = database[state.questionIndex];
            state.currentQ = item;
            state.startTime = Date.now();

            document.getElementById('display-sentence').innerHTML = item.q;
            
            if(Math.random() > 0.5) setOptions(item.correct, item.wrong, item.correct);
            else setOptions(item.wrong, item.correct, item.correct);
        }

        function setOptions(txt1, txt2, correctVal) {
            const btn1 = document.getElementById('btn1'); const btn2 = document.getElementById('btn2');
            btn1.innerHTML = txt1; btn1.onclick = () => checkAnswer(txt1 === correctVal, btn1);
            btn2.innerHTML = txt2; btn2.onclick = () => checkAnswer(txt2 === correctVal, btn2);
        }

        function checkAnswer(isCorrect, element) {
            const fb = document.getElementById('feedback');
            const timeDelta = Date.now() - state.startTime;
            const isSpeed = timeDelta < 2500; 

            if (isCorrect) {
                state.combo++;
                let xpGain = 15 + (state.combo * 3); 
                if(isSpeed) xpGain += 10;
                addXP(xpGain);
                
                fb.innerText = "PRECISO!"; fb.style.color = "#00e676"; fb.className = "visible";
                element.classList.add('correct');
                triggerCasinoEffect(20);
                
                if (state.combo % 10 === 0) { playAudio('milestone'); triggerCoinRain(40); } 
                else if (state.combo > 1) { playAudio('combo'); } 
                else { playAudio('win'); }
                
                if(isSpeed) document.getElementById('speed-feedback').innerText = "⚡ REFLEXO NEURAL!";

                const comboEl = document.getElementById('combo-feedback');
                comboEl.innerText = `COMBO x${state.combo}`; comboEl.classList.add('show');
                document.getElementById('progress-bar').style.width = ((state.questionIndex + 1) % 100) + '%';

                setTimeout(() => { comboEl.classList.remove('show'); state.questionIndex++; generate(); }, 1200);
            } else {
                state.combo = 0; 
                addXP(-10); 
                fb.innerText = "FALHA DE MEMÓRIA: " + state.currentQ.correct.toUpperCase();
                fb.style.color = "#ff1744"; fb.className = "visible";
                element.classList.add('wrong');
                playAudio('error');
                
                const card = document.getElementById('game-card-element');
                card.classList.add('shake-effect');
                setTimeout(() => card.classList.remove('shake-effect'), 400);
                document.getElementById('combo-feedback').classList.remove('show');
            }
        }

        function addXP(val) {
            xp = Math.max(0, xp + val); 
            localStorage.setItem('ffes_xp', xp); 
            document.getElementById('xp-val').innerText = xp;
        }

        window.onload = startGame;
    </script>
</body>
