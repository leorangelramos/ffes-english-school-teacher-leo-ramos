    <style>
        .slide-deck-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: 50px;
        }

        .verb-slide {
            background: rgba(10, 25, 47, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 2rem;
            width: 100%;
            max-width: 1100px;
            display: none;
            flex-direction: column;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-standard);
        }
        .verb-slide.active { display: flex; animation: fadeIn 0.4s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .slide-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-blue);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .slide-header h2 {
            font-family: 'Syncopate', sans-serif;
            color: var(--gold-tech);
            font-size: 1.8rem;
            margin: 0;
            text-transform: uppercase;
        }
        .slide-counter { color: var(--text-muted); font-weight: 800; font-size: 0.9rem; letter-spacing: 1px; }

        .verb-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .verb-table th {
            background: rgba(59, 130, 246, 0.2);
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--glass-border);
        }
        .verb-table td {
            padding: 20px;
            border: 1px solid var(--glass-border);
            vertical-align: top;
            text-align: center;
        }

        .input-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .verb-input {
            width: 100%;
            max-width: 160px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
        }
        .verb-input:focus { outline: none; border-color: var(--gold-tech); box-shadow: 0 0 12px rgba(229,192,91,0.5); }
        .verb-input.correct { border-color: #0f0; background: rgba(0, 255, 0, 0.1); color: #0f0; }
        .verb-input.wrong { border-color: #f00; background: rgba(255, 0, 0, 0.1); color: #f00; }
        .verb-input.revealed { border-color: var(--primary-blue); background: rgba(59, 130, 246, 0.2); color: #8cb4f9; font-style: italic; }
        .verb-input:disabled { cursor: not-allowed; }

        .slide-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .btn-group { display: flex; gap: 15px; }

        .navigation-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .verb-table th, .verb-table td { padding: 10px 5px; }

            .slide-header h2 { font-size: 1.3rem; }
            .slide-actions { flex-direction: column; gap: 15px; }
            .btn-group { width: 100%; display: flex; justify-content: space-between; }

                { id: 78, base: "CONSIDER", pres: ["consider", "considers"], past: ["considered"], part: ["considered"], ing: ["considering"], trad: ["considerar"] },
                { id: 79, base: "APPEAR", pres: ["appear", "appears"], past: ["appeared"], part: ["appeared"], ing: ["appearing"], trad: ["aparecer", "parecer"] },
                { id: 80, base: "BUY", pres: ["buy", "buys"], past: ["bought"], part: ["bought"], ing: ["buying"], trad: ["comprar"] }
            ];

            // RENDERIZAÇÃO DOS SLIDES NO DOM
            function renderSlides() {
                let html = '';
                db.forEach((verb, idx) => {
                    html += `
                    <div class="verb-slide" id="slide-${idx}">
                        <div class="slide-header">
                            <h2>TO ${verb.base}</h2>
                            <span class="slide-counter">MATRIZ ${verb.id} / 80</span>
                        </div>
                        
                        <div style="overflow-x:auto;">
                            <table class="verb-table">
                                <thead>
                                    <tr>
                                        <th>Presente</th>
                                        <th>Passado</th>
                                        <th>Particípio</th>
                                        <th>Gerúndio</th>
                                        <th>Tradução Principal</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>
                                            <div class="input-stack">
                                                ${verb.pres.map((_, i) => `<input type="text" class="verb-input" data-verb="${idx}" data-type="pres" placeholder="... ">`).join('')}
                                            </div>
                                        </td>
                                        <td>
                                            <div class="input-stack">
                                                ${verb.past.map((_, i) => `<input type="text" class="verb-input" data-verb="${idx}" data-type="past" placeholder="... ">`).join('')}
                                            </div>
                                        </td>
                                        <td>
                                            <div class="input-stack">
                                                ${verb.part.map((_, i) => `<input type="text" class="verb-input" data-verb="${idx}" data-type="part" placeholder="... ">`).join('')}
                                            </div>
                                        </td>
                                        <td>
                                            <div class="input-stack">
                                                ${verb.ing.map((_, i) => `<input type="text" class="verb-input" data-verb="${idx}" data-type="ing" placeholder="... ">`).join('')}
                                            </div>
                                        </td>
                                        <td>
                                            <div class="input-stack">
                                                ${verb.trad.map((_, i) => `<input type="text" class="verb-input" data-verb="${idx}" data-type="trad" placeholder="... ">`).join('')}
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="slide-actions">
                            <div id="msg-${idx}" style="font-size:0.85rem; font-weight:bold; min-height:20px; color:var(--text-main);">Preencha os espaços e verifique a sintaxe.</div>
                            <div class="btn-group">
                                <button class="cyber-btn cyber-btn-primary" style="padding: 10px 20px; font-size:0.75rem;" onclick="window.verifySlide(${idx})">Verificar</button>
                                <button class="cyber-btn cyber-btn-gold" style="padding: 10px 20px; font-size:0.75rem;" onclick="window.showAnswers(${idx})">Gabarito</button>
                            </div>
                        </div>
                    </div>
                    `;
                });
                container.innerHTML = html;
                updateView();
            }

            function updateView() {
                document.querySelectorAll('.verb-slide').forEach((slide, i) => {
                    slide.classList.toggle('active', i === currentSlide);
                });
                document.getElementById('btn-prev').disabled = (currentSlide === 0);
                document.getElementById('btn-next').disabled = (currentSlide === db.length - 1);
            }

            document.getElementById('btn-next').onclick = () => { if (currentSlide < db.length - 1) { currentSlide++; updateView(); } };
            document.getElementById('btn-prev').onclick = () => { if (currentSlide > 0) { currentSlide--; updateView(); } };

            // LÓGICA DE VERIFICAÇÃO FLEXÍVEL (INDIFERENTE À ORDEM)
            window.verifySlide = function(idx) {
                const verbData = db[idx];
                const slide = document.getElementById(`slide-${idx}`);
                const inputs = slide.querySelectorAll('.verb-input');
                const msg = document.getElementById(`msg-${idx}`);

                let correctCount = 0;
                let wrongCount = 0;
                let emptyCount = 0;
                let hasAction = false;

                // O usuário pode digitar 'are', 'is', 'am' em qualquer input do presente, e nós validamos isso.
                const usedMatches = { pres: [], past: [], part: [], ing: [], trad: [] };

                inputs.forEach(input => {
                    if (input.disabled) return; // Pula os que já foram acertados ou revelados
                    const userVal = input.value.trim().toLowerCase();
                    if (!userVal) { emptyCount++; return; }

                    const type = input.dataset.type;
                    const officialArray = verbData[type];

                    let isCorrect = false;

                    if (type === 'trad') {
                        // Tradução: aceita se o valor do usuário for sinônimo básico ou parte da string (ex: 'ser' dentro de 'ser, estar')
                        isCorrect = officialArray.some(t => userVal === t || userVal.includes(t) || t.includes(userVal));
                    } else {
                        // Conjugação exata: O valor deve estar no array oficial, E não pode ter sido usado por outro input da mesma categoria
                        if (officialArray.includes(userVal) && !usedMatches[type].includes(userVal)) {
                            isCorrect = true;
                            usedMatches[type].push(userVal);
                        }
                    }

                    if (isCorrect) {
                        input.classList.remove('wrong');
                        input.classList.add('correct');
                        input.disabled = true;
                        correctCount++;
                        hasAction = true;
                    } else {
                        input.classList.remove('correct');
                        input.classList.add('wrong');
                        wrongCount++;
                        hasAction = true;
                    }
                });

                if (hasAction) {
                    placarAcertos.textContent = parseInt(placarAcertos.textContent) + correctCount;
                    placarErros.textContent = parseInt(placarErros.textContent) + wrongCount;
                    
                    if (wrongCount === 0 && correctCount > 0) {
                        msg.innerHTML = `<span style="color:#0f0;">Matriz Validada! +${correctCount*10} XP</span>`;
                        if(window.updateXPAndCombo) window.updateXPAndCombo(correctCount * 10, true);
                    } else if (wrongCount > 0) {
                        msg.innerHTML = `<span style="color:#f00;">Anomalia detectada. Ajuste as palavras em vermelho.</span>`;
                        if(window.updateXPAndCombo) window.updateXPAndCombo(0, false);
                    }

                    if (window.globalXP !== undefined && xpBoard) xpBoard.textContent = window.globalXP;
                } else if (emptyCount > 0) {
                    msg.innerHTML = `<span style="color:var(--gold-tech);">Preencha os campos vazios antes de verificar.</span>`;
                }
            };

            // MOSTRAR GABARITO (REVELA SOMENTE O QUE ESTÁ FALTANDO)
            window.showAnswers = function(idx) {
                const verbData = db[idx];
                const slide = document.getElementById(`slide-${idx}`);
                const inputs = slide.querySelectorAll('.verb-input');

                let errorPenalty = 0;
                
                // Track available answers that haven't been used yet
                let availableAnswers = {
                    pres: [...verbData.pres],
                    past: [...verbData.past],
                    part: [...verbData.part],
                    ing:  [...verbData.ing],
                    trad: [...verbData.trad]
                };

                // Remove from available array the answers that are already correct
                inputs.forEach(input => {
                    if (input.disabled && input.classList.contains('correct')) {
                        const type = input.dataset.type;
                        const userVal = input.value.trim().toLowerCase();
                        const idxToRemove = availableAnswers[type].indexOf(userVal);
                        if (idxToRemove > -1) availableAnswers[type].splice(idxToRemove, 1);
                    }
                });

                // Fill the remaining inputs
                inputs.forEach(input => {
                    if (!input.disabled && !input.classList.contains('correct')) {
                        const type = input.dataset.type;
                        
                        input.value = availableAnswers[type].shift() || verbData[type][0]; 
                        
                        input.classList.remove('wrong');
                        input.classList.add('revealed');
                        input.disabled = true;
                        errorPenalty++;
                    }
                });

                if (errorPenalty > 0) {
                    placarErros.textContent = parseInt(placarErros.textContent) + errorPenalty;
                    if(window.updateXPAndCombo) window.updateXPAndCombo(0, false);
                }
            };

            // ZERAR SISTEMA
            document.getElementById('reset-system').onclick = () => {
                placarAcertos.textContent = '0';
                placarErros.textContent = '0';
                currentSlide = 0;
                if(window.resetComboUI) window.resetComboUI();
                renderSlides();
            };

            // INICIALIZA
            renderSlides();
        });
    </script>
</body>
</html>
