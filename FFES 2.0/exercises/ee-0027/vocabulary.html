                const item = rawList[i % rawList.length].split('|');
                const port = item[0];
                const engCorrect = item[1];
                let engDistractor = item[2];
                
                // Variações dinâmicas para dificultar o distrator e evitar repetição visual exata
                if(i > rawList.length) {
                    const randomItem = rawList[Math.floor(Math.random() * rawList.length)].split('|');

                    // Prevenção de distrator ser igual à resposta correta
                    while(engDistractor === engCorrect) {
                        const newRandom = rawList[Math.floor(Math.random() * rawList.length)].split('|');
                        engDistractor = newRandom[1];
                    }
                }

                fullDB.push({
                    q: `Como se diz <span style="color: #fff; text-decoration: underline;">"${port}"</span> em inglês?`,
                    a: engCorrect,
                    o: [engCorrect, engDistractor]
                });
            }

            function shuffle(a) {
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];

                        item.done = true;
                        const correct = btn.dataset.val === item.a;
                        
                        if(correct) {
                            btn.classList.add('correct-ans');
                            placarAcertos.textContent = parseInt(placarAcertos.textContent) + 1;
                            window.updateXPAndCombo(10, true);
                            
                            // Avanço automático se acertar para manter o ritmo rápido
                            setTimeout(() => {
                                currentIndex++;
                                renderQuiz();
                            }, 500);
                        } else {
                            btn.classList.add('wrong-ans');
                            placarErros.textContent = parseInt(placarErros.textContent) + 1;
                            window.updateXPAndCombo(0, false);
                            
                            // Mostra a correta
                            document.querySelectorAll('.opt-btn').forEach(b => { 
                                if(b.dataset.val === item.a) b.classList.add('correct-ans'); 
                                b.disabled = true;
                            });
                            document.getElementById('q-next').style.display = 'block'; // Obriga a clicar no botão para avançar (aprender com o erro)
                        }
                    };
                });

                const nextBtn = document.getElementById('q-next');
                if(nextBtn) {
                    nextBtn.onclick = () => {
                        currentIndex++;
                        renderQuiz();
                    };
                }
            }

            function init() {
                currentIndex = 0;
                placarAcertos.textContent = '0';
                placarErros.textContent = '0';
                window.resetComboUI();
                currentOrder = shuffle(fullDB.map(x => ({...x, done: false})));
                renderQuiz();
            }

            init();
        });
    </script>
</body>
</html>
